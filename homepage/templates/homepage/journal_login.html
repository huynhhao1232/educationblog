{% extends 'homepage/template.html' %}
{% load static %}
{% block title %}Sổ đầu bài - Vào sổ{% endblock %}
{% block index %}
<style>
  .journal-login-wrap { max-width: 420px; margin: 0 auto; }
  .journal-login-wrap .journal-title { text-align: center; font-size: 1.25rem; font-weight: 700; color: #023EB6; margin-bottom: 0.5rem; }
  .journal-login-wrap .journal-sub { text-align: center; color: #6c757d; font-size: 0.9rem; margin-bottom: 1.5rem; }
  .journal-login-wrap .form-box { border: 1px solid #dee2e6; border-radius: 8px; padding: 24px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .journal-login-wrap .form-label { font-weight: 600; }
</style>
<div class="container py-5">
  <div class="journal-login-wrap">
    <div class="journal-title"><i class="fas fa-book-open me-2"></i>Sổ đầu bài số</div>
    <p class="journal-sub">Nhập mã số giáo viên để vào sổ đầu bài cá nhân.</p>
    {% if error %}
      <div class="alert alert-danger py-2" role="alert">{{ error }}</div>
    {% endif %}
    <div class="form-box">
      <form method="post" action="{% url 'homepage:journal_login' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label for="access_code" class="form-label">Mã số giáo viên</label>
          <input type="text" class="form-control form-control-lg" id="access_code" name="access_code"
                 placeholder="Nhập mã số truy cập" autofocus value="{{ request.POST.access_code|default:'' }}">
        </div>
        <button type="submit" class="btn w-100 text-white fw-semibold py-2" style="background-color: #023EB6;">
          <i class="fas fa-sign-in-alt me-1"></i>Vào sổ
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
